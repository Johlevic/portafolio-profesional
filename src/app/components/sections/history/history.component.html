<div class="w-full">
  <!-- Historia personal -->
  <article
    class="bg-white/40 dark:bg-gray-800/40 backdrop-blur-sm border border-gray-200 dark:border-gray-800/50 rounded-2xl p-8 lg:p-10 relative shadow-2xl shadow-blue-500/5 hover:border-blue-500/30 transition-all duration-500"
    [class.expanded]="expanded"
  >
    <hgroup class="mb-10">
      <h3
        class="text-blue-600 dark:text-blue-400 text-2xl lg:text-3xl font-bold flex flex-wrap items-center gap-3 sm:gap-4"
      >
        <span class="flex min-w-0 flex-1 items-center gap-3 sm:gap-4">
          <span class="shrink-0 p-3 bg-blue-500/10 rounded-xl">
            <i class="bi bi-person-badge text-blue-500"></i>
          </span>
          <span class="min-w-0 leading-tight">{{
            languageService.t("history.title")
          }}</span>
        </span>
        <div
          *ngIf="speechSupported"
          class="flex shrink-0 flex-wrap items-center gap-2"
        >
          <select
            class="h-10 max-w-[min(100%,11rem)] min-w-[8.5rem] cursor-pointer rounded-xl border border-blue-500/25 bg-white/90 px-2 text-xs font-medium text-gray-800 shadow-sm transition hover:border-blue-500/40 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-400 focus-visible:ring-offset-2 dark:bg-gray-900/90 dark:text-gray-100 dark:focus-visible:ring-offset-gray-900"
            [attr.aria-label]="languageService.t('history.voiceSpeedAria')"
            [value]="speechRate"
            (change)="onSpeechSpeedChange($event)"
          >
            @for (rate of speechRatePresets; track rate) {
              <option [value]="rate">
                {{ speechRateOptionLabel(rate) }}
              </option>
            }
          </select>
        <button
          type="button"
          (click)="toggleVoiceRead()"
          class="inline-flex h-10 w-10 shrink-0 items-center justify-center rounded-xl border border-blue-500/25 bg-blue-500/10 text-blue-600 transition hover:bg-blue-500/20 hover:text-blue-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-400 focus-visible:ring-offset-2 dark:text-blue-400 dark:hover:bg-blue-500/15 dark:hover:text-blue-300 dark:focus-visible:ring-offset-gray-900"
          [attr.aria-pressed]="isSpeaking"
          [attr.aria-label]="
            isSpeaking
              ? languageService.t('history.voiceStopButton')
              : languageService.t('history.voiceIconPlay')
          "
          [title]="
            isSpeaking
              ? languageService.t('history.voiceStopButton')
              : languageService.t('history.voiceIconPlay')
          "
        >
          <i
            class="bi text-xl leading-none"
            [class.bi-stop-fill]="isSpeaking"
            [class.bi-volume-up-fill]="!isSpeaking"
            aria-hidden="true"
          ></i>
        </button>
        </div>
      </h3>
    </hgroup>

    <div
      class="overflow-hidden transition-all duration-700 ease-in-out text-gray-700 dark:text-gray-300 text-base leading-relaxed font-light tracking-wide space-y-6"
      [class.max-h-64]="!expanded && !isLargeScreen"
      [class.max-h-full]="expanded || isLargeScreen"
    >
      <p [innerHTML]="languageService.t('history.p1')"></p>
      <p [innerHTML]="languageService.t('history.p2')"></p>

      <!-- Hidden on mobile snippet, shown if expanded or desktop -->
      <ng-container *ngIf="expanded || isLargeScreen">
        <p [innerHTML]="languageService.t('history.p3')"></p>
        <p [innerHTML]="languageService.t('history.p4')"></p>
        <p [innerHTML]="languageService.t('history.p5')"></p>
      </ng-container>
    </div>

    <!-- Botón ver más / ver menos -->
    <button
      *ngIf="!isLargeScreen"
      class="mt-10 w-full lg:w-auto text-blue-600 dark:text-blue-400 font-semibold hover:text-blue-700 dark:hover:text-blue-300 transition-colors duration-200 focus:outline-none flex items-center justify-center lg:justify-start gap-3 py-3 px-6 rounded-xl border border-blue-500/20 bg-blue-500/5 hover:bg-blue-500/10"
      (click)="toggleExpand()"
    >
      {{
        expanded
          ? languageService.t("history.viewLess")
          : languageService.t("history.viewMore")
      }}
      <i
        class="bi"
        [class.bi-chevron-up]="expanded"
        [class.bi-chevron-down]="!expanded"
      ></i>
    </button>
  </article>
</div>
