<div class="w-full">
  <article
    class="relative rounded-2xl border p-6 shadow-2xl shadow-blue-500/5 transition-all duration-500 hover:border-blue-500/30 sm:p-8 lg:p-10"
    [class.expanded]="expanded"
    [ngClass]="
      solidOverMesh
        ? 'z-20 border-gray-200 bg-white hover:border-blue-500/30 dark:border-gray-700 dark:bg-gray-900'
        : 'border-gray-200 bg-white/40 backdrop-blur-sm hover:border-blue-500/30 dark:border-gray-800/50 dark:bg-gray-800/40'
    "
  >
    <hgroup class="mb-8 sm:mb-10">
      <div
        class="flex flex-col gap-4 sm:mb-0 sm:flex-row sm:flex-wrap sm:items-center sm:justify-between sm:gap-4"
      >
        <h3
          class="flex min-w-0 items-center gap-3 text-2xl font-bold leading-tight text-blue-600 dark:text-blue-400 sm:gap-4 lg:text-3xl"
        >
          <span class="shrink-0 rounded-xl bg-blue-500/10 p-3">
            <i class="bi bi-person-badge text-blue-500"></i>
          </span>
          <span class="min-w-0">{{
            languageService.t("history.title")
          }}</span>
        </h3>

        <div
          *ngIf="speechSupported"
          class="flex w-full min-w-0 flex-wrap items-stretch gap-2 sm:w-auto sm:shrink-0 sm:justify-end"
        >
          <select
            class="h-10 min-h-10 min-w-0 flex-1 cursor-pointer rounded-xl border border-blue-500/25 bg-white/90 px-2 text-xs font-medium text-gray-800 shadow-sm transition hover:border-blue-500/40 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-400 focus-visible:ring-offset-2 dark:bg-gray-900/90 dark:text-gray-100 dark:focus-visible:ring-offset-gray-900 sm:max-w-[11rem] sm:flex-none sm:min-w-[8.5rem]"
            [attr.aria-label]="languageService.t('history.voiceSpeedAria')"
            [value]="speechRate"
            (change)="onSpeechSpeedChange($event)"
          >
            @for (rate of speechRatePresets; track rate) {
              <option [value]="rate">
                {{ speechRateOptionLabel(rate) }}
              </option>
            }
          </select>
          <button
            type="button"
            (click)="toggleVoiceRead()"
            class="inline-flex h-10 w-10 shrink-0 items-center justify-center rounded-xl border border-blue-500/25 bg-blue-500/10 text-blue-600 transition hover:bg-blue-500/20 hover:text-blue-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-400 focus-visible:ring-offset-2 dark:text-blue-400 dark:hover:bg-blue-500/15 dark:hover:text-blue-300 dark:focus-visible:ring-offset-gray-900"
            [attr.aria-pressed]="isSpeaking"
            [attr.aria-label]="
              isSpeaking
                ? languageService.t('history.voiceStopButton')
                : languageService.t('history.voiceIconPlay')
            "
            [title]="
              isSpeaking
                ? languageService.t('history.voiceStopButton')
                : languageService.t('history.voiceIconPlay')
            "
          >
            <i
              class="bi text-xl leading-none"
              [class.bi-stop-fill]="isSpeaking"
              [class.bi-volume-up-fill]="!isSpeaking"
              aria-hidden="true"
            ></i>
          </button>
        </div>
      </div>
    </hgroup>

    <div
      class="overflow-hidden text-base font-light leading-relaxed tracking-wide text-gray-700 transition-all duration-700 ease-in-out dark:text-gray-300 space-y-6"
      [class.max-h-64]="!expanded && !isLargeScreen"
      [class.max-h-full]="expanded || isLargeScreen"
    >
      <p [innerHTML]="languageService.t('history.p1')"></p>
      <p [innerHTML]="languageService.t('history.p2')"></p>

      <ng-container *ngIf="expanded || isLargeScreen">
        <p [innerHTML]="languageService.t('history.p3')"></p>
        <p [innerHTML]="languageService.t('history.p4')"></p>
        <p [innerHTML]="languageService.t('history.p5')"></p>
      </ng-container>
    </div>

    <button
      *ngIf="!isLargeScreen"
      class="mt-8 flex w-full items-center justify-center gap-3 rounded-xl border border-blue-500/20 bg-blue-500/5 px-6 py-3 font-semibold text-blue-600 transition-colors duration-200 hover:bg-blue-500/10 hover:text-blue-700 focus:outline-none dark:text-blue-400 dark:hover:text-blue-300 sm:mt-10 lg:w-auto lg:justify-start"
      (click)="toggleExpand()"
    >
      {{
        expanded
          ? languageService.t("history.viewLess")
          : languageService.t("history.viewMore")
      }}
      <i
        class="bi"
        [class.bi-chevron-up]="expanded"
        [class.bi-chevron-down]="!expanded"
      ></i>
    </button>
  </article>
</div>
